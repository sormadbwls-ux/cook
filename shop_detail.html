<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <!-- 헤더 영역 -->

    
      <header class="main-header">
        <div class="logo">
          <a href="index.html">
          <img src="assets/image/main_logo_cook.png" alt="요리조리 로고" />
          </a>
        </div>
        <div class="search-wrap">
          <img
            src="assets/icons/zoom_icon.png"
            alt="돋보기"
            class="search-icon"
          />
          <input
            type="text"
            class="search-input"
            placeholder="오늘의 레시피를 검색해보세요"
          />
        </div>
        <div class="header-icons">
          <div class="icon-btn">
            <a href="sign.html" class="icon-btn">
            <img
              src="assets/icons/mypage_icon.png"
              alt="마이페이지"
              class="icon-img"
            />
            </a>
          </div>
          <div
            class="icon-btn"
            onclick="location.href = 'shopping.html'"
            style="cursor: pointer"
          >
            <img
              src="assets/icons/shopping_icon.png"
              alt="장바구니"
              class="icon-img"
            />
          </div>
        </div>
      </header>

      <nav class="nav-menu">
        <a href="shopping.html">채소/과일</a>
        <a href="shopping.html">고기/수산</a>
        <a href="shopping.html">양념/소스</a>
        <a href="shopping.html">유제품/계란</a>
      </nav>

      <div class="container">
      <!-- 1. 상품 상단 정보 -->
      <section class="product-main">
        <div class="product-image">
          <img src="assets/image/found_image_01.png" alt="유부초밥" />
          <!-- 경로 확인 필요 -->
        </div>
        <div class="product-info">
          <p class="brand">풀무원</p>
          <h1 class="title">고소한 유부초밥 4인분, 330g 2개</h1>
          <div class="rating">★★★★★ (46,038)</div>
          <div class="price">11,660원</div>
          <div class="buttons">
            <button class="btn-cart">장바구니 담기</button>
            <button class="btn-buy" onclick="location.href='cart.html'">바로구매</button>
          </div>
        </div>
      </section>

      <!-- 2. 함께 비교하면 좋을 상품 -->
      <section class="recommendations">
        <h3>함께 비교하면 좋을 상품</h3>
        <div class="grid">
          <div class="card">
            <img src="assets/image/found_image_02.png" />
            <p>풀무원 고소한 유부초밥...</p>
            <p class="card-price">13,000원</p>
          </div>

          <div class="card">
            <img src="assets/image/found_image_01.png" />
            <p>풀무원 고소한 유부초밥...</p>
            <p class="card-price">11,600원</p>
          </div>

          <div class="card">
            <img src="assets/image/found_image_02.png" />
            <p>풀무원 고소한 유부초밥...</p>
            <p class="card-price">13,000원</p>
          </div>
        </div>
      </section>

      <!-- 3. 탭 메뉴 (자바스크립트 연결을 위해 tab-link와 data-target 추가) -->
      <nav class="tabs">
        <ul>
          <li class="tab-link active" data-target="detail">상품상세</li>
          <li class="tab-link" data-target="reviews">상품평(33,521)</li>
          <li class="tab-link" data-target="qna">상품문의</li>
          <li class="tab-link" data-target="shipping">배송/교환/반품안내</li>
        </ul>
      </nav>

      <!-- 4. 탭 내용 영역 -->
      <div class="content-box">
        <!-- 상품 상세 (기본 active) -->
        <div id="detail" class="tab-content active">
          <img src="assets/image/shop_detail_01.png" alt="상세 01" />
          <img src="assets/image/shop_detail_02.png" alt="상세 02" />
          <img src="assets/image/shop_detail_03.png" alt="상세 03" />
          <img src="assets/image/shop_detail_04.png" alt="상세 04" />
        </div>

        <!-- 상품평 (내용 예시) -->
        <div id="reviews" class="tab-content">
          <div style="padding: 50px; text-align: center">
            등록된 상품평이 없습니다.
          </div>
        </div>

        <!-- 상품문의 (내용 예시) -->
        <div id="qna" class="tab-content">
          <div style="padding: 50px; text-align: center">
            문의사항이 없습니다.
          </div>
        </div>

        <!-- 배송/반품 (내용 예시) -->
        <div id="shipping" class="tab-content">
          <div style="padding: 50px; text-align: center">
            배송 및 반품 안내 정보입니다.
          </div>
        </div>
      </div>
    </div>
    </div>
    <!-- .container 끝 -->
  </body>
</html>
