<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>요리조리 - 레시피 검색결과</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo">
        <img src="assets/image/main_logo_cook.png" alt="요리조리 로고" />
      </div>
      <div class="search-wrap">
        <img
          src="assets/icons/zoom_icon.png"
          alt="돋보기"
          class="search-icon"
        />
        <input
          type="text"
          class="search-input"
          placeholder="오늘의 레시피를 검색해보세요"
        />
      </div>
      <div class="header-icons">
        <div class="icon-btn">
          <img
            src="assets/icons/mypage_icon.png"
            alt="마이페이지"
            class="icon-img"
          />
        </div>
        <div
          class="icon-btn"
          onclick="location.href = 'shopping.html'"
          style="cursor: pointer"
        >
          <img
            src="assets/icons/shopping_icon.png"
            alt="장바구니"
            class="icon-img"
          />
        </div>
      </div>
    </header>

    <nav class="nav-menu">
      <a href="#">채소/과일</a>
      <a href="#">고기/수산</a>
      <a href="#">양념/소스</a>
      <a href="#">유제품/계란</a>
    </nav>

    <section class="search-result-section">
      <div
        class="search-container"
        style="display: flex; gap: 40px; padding: 40px"
      >
        <aside class="filter-sidebar" style="width: 200px">
          <div class="filter-group">
            <h3 style="border-bottom: 2px solid #2d4333; padding-bottom: 5px">
              난이도
            </h3>
            <ul style="list-style: none; padding: 0; line-height: 2">
              <li>
                <label>★★★★★ <input type="checkbox" checked /></label>
              </li>
              <li>
                <label>★★★★☆ <input type="checkbox" /></label>
              </li>
              <li>
                <label>★★★☆☆ <input type="checkbox" /></label>
              </li>
              <li>
                <label>★★☆☆☆ <input type="checkbox" /></label>
              </li>
              <li>
                <label>★☆☆☆☆ <input type="checkbox" /></label>
              </li>
            </ul>
          </div>

          <div class="filter-group" style="margin-top: 30px">
            <h3 style="border-bottom: 2px solid #2d4333; padding-bottom: 5px">
              맵기
            </h3>
            <ul style="list-style: none; padding: 0; line-height: 2">
              <li>
                <label>순한맛 <input type="checkbox" /></label>
              </li>
              <li>
                <label>보통맛 <input type="checkbox" /></label>
              </li>
              <li>
                <label>매운맛 <input type="checkbox" /></label>
              </li>
            </ul>
          </div>

          <div
            class="sort-options"
            style="margin-top: 50px; color: #888; cursor: pointer"
          >
            <p>최신순</p>
            <p style="color: #000; font-weight: bold">인기순</p>
          </div>
        </aside>

        <main class="recipe-results" style="flex: 1">
          <div
            class="recipe-grid"
            style="
              display: grid;
              grid-template-columns: repeat(2, 1fr);
              gap: 20px;
            "
          >
            <div
              class="recipe-card-horizontal"
              style="
                display: flex;
                border: 1px solid #eee;
                border-radius: 15px;
                padding: 15px;
                background: #fff;
              "
            >
              <div class="card-img-box">
                <img
                  src="assets/image/smoothie.png"
                  alt="스무디"
                  style="width: 120px; border-radius: 10px"
                />
              </div>
              <div class="card-info-box" style="margin-left: 15px">
                <h4 style="margin: 0">오렌지 딸기 요거트 스무디</h4>
                <p style="font-size: 13px; color: #666">
                  조리시간 5분 / 난이도 ★☆☆☆☆
                </p>
                <span style="font-size: 11px; color: #aaa"
                  >♥ 1550명의 사람이 추천했어요</span
                >
              </div>
            </div>

            <div
              class="recipe-card-horizontal"
              style="
                display: flex;
                border: 1px solid #eee;
                border-radius: 15px;
                padding: 15px;
                background: #fff;
              "
            >
              <div class="card-img-box">
                <img
                  src="assets/image/salad.png"
                  alt="샐러드"
                  style="width: 120px; border-radius: 10px"
                />
              </div>
              <div class="card-info-box" style="margin-left: 15px">
                <h4 style="margin: 0">요거트 드레싱 닭가슴살 샐러드</h4>
                <p style="font-size: 13px; color: #666">
                  조리시간 15분 / 난이도 ★☆☆☆☆
                </p>
                <span style="font-size: 11px; color: #aaa"
                  >♥ 1525명의 사람이 추천했어요</span
                >
              </div>
            </div>
          </div>
        </main>
      </div>
    </section>

    <div
      class="bottom-action-area"
      style="
        text-align: center;
        padding: 50px 0;
        display: flex;
        justify-content: center;
        gap: 20px;
      "
    ></div>
  </body>
</html>
