<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>요리조리</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo">
        <img src="assets/image/main_logo_cook.png" alt="요리조리 로고" />
      </div>
      <div class="search-wrap">
        <img
          src="assets/icons/zoom_icon.png"
          alt="돋보기"
          class="search-icon"
        />
        <input
          type="text"
          class="search-input"
          placeholder="오늘의 레시피를 검색해보세요"
        />
      </div>
      <div class="header-icons">
        <div class="icon-btn">
          <img
            src="assets/icons/mypage_icon.png"
            alt="마이페이지"
            class="icon-img"
          />
        </div>
        <div
          class="icon-btn"
          onclick="location.href = 'shopping.html'"
          style="cursor: pointer"
        >
          <img
            src="assets/icons/shopping_icon.png"
            alt="장바구니"
            class="icon-img"
          />
        </div>
      </div>
    </header>

    <nav class="nav-menu">
      <a href="shopping.html">채소/과일</a>
      <a href="shopping.html">고기/수산</a>
      <a href="shopping.html">양념/소스</a>
      <a href="shopping.html">유제품/계란</a>
    </nav>

    <section class="main-banner">
      <div class="ad-list-box">
        <div class="ad-item">광고배너 문구</div>
        <div class="ad-item active-line">광고배너 문구</div>
        <div class="ad-item">광고배너 문구</div>
        <div class="ad-item">광고배너 문구</div>
        <div class="ad-item">광고배너 문구</div>
      </div>
    </section>
    <!-- 위에는 건들지 말것/////////////////////////////////////////////////////////////// -->

    <!-- 여기부터 인기레시피 테라피 레시피 -->
    <section class="recipe-section">
      <div class="recipe-flex-container">
        <div class="recipe-column">
          <div class="title-bar">
            <h2 class="title-with-icon">
              <img
                src="assets/icons/home_icon_leaft_01.png"
                class="leaf-icon"
              />
              오늘의 인기 레시피
            </h2>
            <span class="more-btn">더 보기</span>
          </div>

          <div class="food-card-layout">
            <div class="food-img-stack">
              <img
                src="assets/image/hom_image_hotcake_01.png"
                class="food-img"
              />
              <img src="assets/icons/no1_cion2.png" class="badge" />
            </div>
            <div class="food-info">
              <h3>바나나 바질 핫케이크</h3>
              <p class="tag-list">#스트레스 풀림 #디저트 #아이들 간식 대용</p>
            </div>
          </div>
        </div>

        <div class="recipe-column">
          <div class="title-bar">
            <h2 class="title-with-icon">
              <img
                src="assets/icons/home_icon_leaft_01.png"
                class="leaf-icon"
              />
              테라피 레시피
            </h2>
            <span class="more-btn">더 보기</span>
          </div>
          <p class="guide-text">지금 내 상태에 맞는 레시피를 찾아줄께요</p>

          <div class="therapy-grid-box">
            <div class="t-unit">
              <div class="t-circle pink">
                <img src="assets/icons/menu-icon_06.png" />
                <span>저칼로리</span>
              </div>
            </div>

            <div class="t-unit">
              <div class="t-circle blue">
                <img src="assets/icons/menu-icon_05.png" />
                <span>당뇨</span>
              </div>
            </div>

            <div class="t-unit">
              <div class="t-circle orange">
                <img src="assets/icons/menu-icon_04.png" />
                <span>혈압</span>
              </div>
            </div>

            <div class="t-unit">
              <div class="t-circle green">
                <img src="assets/icons/menu-icon_03.png" />
                <span>피부/미용</span>
              </div>
            </div>

            <div class="t-unit">
              <div class="t-circle blue">
                <img src="assets/icons/menu-icon_02.png" />
                <span>유아</span>
              </div>
            </div>

            <div class="t-unit">
              <div class="t-circle green">
                <img src="assets/icons/menu-icon_01.png" />
                <span>소화불량</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- //////////////////////////////////여기까지가 테라피 레시피 인기 레시피 구간///////////////////////////////////////////////// -->
    <section class="fridge-banner-section">
      <div
        class="fridge-banner-bg"
        style="background: none; text-align: center"
      >
        <p class="fridge-guide-text">지금 내 냉장고에 딱 맞는 레시피는?</p>

        <div class="fridge-button" onclick="location.href = 'upload.html'">
          <span>내 냉장고 맞춤 레시피 찾기</span>
          <img
            src="assets/icons/face_icon.png"
            class="cook-character"
            alt="요리사 캐릭터"
          />
        </div>
      </div>
    </section>
    <!-- 여기까지가 하단 내 냉장고 레시피 -->
  </body>
</html>
