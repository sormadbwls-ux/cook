<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>요리조리 - 재료 편집</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "LotteMartDream", sans-serif;
        background-color: #ffffff;
      }
      .header-content {
        padding: 40px 25px 10px 25px;
      }
      .back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 45px;
        height: 45px;
        background-color: #addb47;
        border-radius: 50%;
        text-decoration: none;
        margin-bottom: 20px;
      }
      .back-btn img {
        width: 20px;
      }
      .title-green {
        color: #addb47;
        font-weight: bold;
        font-size: 22px;
        margin: 0;
      }
      .sub-title {
        color: #333;
        font-size: 16px;
        margin: 5px 0 40px 0;
      }

      .main-container {
        display: flex;
        padding: 0 25px;
        gap: 60px;
      }
      .section {
        flex: 1;
      }
      .section-title {
        font-size: 18px;
        font-weight: bold;
        color: #555;
        margin-bottom: 15px;
      }

      /* 입력창 영역 수정 */
      .input-wrapper {
        position: relative;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
      }
      .ingredient-input {
        width: 100%;
        padding: 15px 45px 15px 20px; /* 오른쪽 여백을 줘서 X 버튼 자리를 만듦 */
        border: 2px solid #addb47;
        border-radius: 40px;
        outline: none;
      }
      .section.exclude .ingredient-input {
        border-color: #ddd;
      }

      /* 입력창 안의 X 버튼 스타일 */
      .clear-input-btn {
        position: absolute;
        right: 15px;
        color: #ccc;
        cursor: pointer;
        font-size: 18px;
        user-select: none;
        padding: 5px;
      }
      .clear-input-btn:hover {
        color: #999;
      }

      .tag-label {
        font-size: 14px;
        font-weight: bold;
        color: #666;
        margin-bottom: 15px;
      }
      .tag-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tag {
        display: flex;
        align-items: center;
        padding: 8px 15px;
        background-color: #f2f2f2;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
        color: #444;
      }
      .remove-btn {
        margin-left: 8px;
        cursor: pointer;
        color: #999;
      }

      .bottom-area {
        position: fixed;
        bottom: 40px;
        width: 100%;
        text-align: center;
      }
      .search-btn {
        width: 85%;
        max-width: 500px;
        padding: 20px;
        background-color: #addb47;
        border: none;
        border-radius: 40px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="header-content">
      <a href="upload.html" class="back-btn">
        <img src="assets/icons/back icon.png" alt="뒤로가기" />
      </a>
      <p class="title-green">냉장고 속의 재료를 입력해주세요</p>
      <p class="sub-title">최적의 레시피를 찾아드릴게요</p>
    </div>

    <div class="main-container">
      <div class="section" id="include-section">
        <p class="section-title">재료 입력</p>
        <div class="input-wrapper">
          <input
            type="text"
            class="ingredient-input"
            placeholder="재료 입력 후 엔터를 눌러주세요"
          />
          <span class="clear-input-btn">✖</span>
        </div>
        <p class="tag-label">입력된 재료</p>
        <div class="tag-container" id="include-tags"></div>
      </div>

      <div class="section exclude" id="exclude-section">
        <p class="section-title">레시피에 제외 할 재료</p>
        <div class="input-wrapper">
          <input
            type="text"
            class="ingredient-input"
            placeholder="제외할 재료 입력 후 엔터"
          />
          <span class="clear-input-btn">✖</span>
        </div>
        <p class="tag-label">입력된 재료</p>
        <div class="tag-container" id="exclude-tags"></div>
      </div>
    </div>

    <div class="bottom-area">
      <a href="recipe_search.html">
        <button class="search-btn">검색</button>
      </a>
    </div>

    <script>
      function initInput(sectionId, containerId) {
        const section = document.getElementById(sectionId);
        const input = section.querySelector(".ingredient-input");
        const container = document.getElementById(containerId);
        const clearBtn = section.querySelector(".clear-input-btn");

        // 1. 엔터 치면 태그 추가
        input.addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            const value = this.value.trim();
            if (value) {
              createTag(value, container);
              this.value = "";
            }
          }
        });

        // 2. 입력창 옆 ✖ 버튼 누르면 텍스트만 삭제
        clearBtn.addEventListener("click", function () {
          input.value = "";
          input.focus(); // 삭제 후 바로 다시 입력할 수 있게 커서 고정
        });
      }

      function createTag(text, container) {
        const tag = document.createElement("div");
        tag.className = "tag";
        tag.innerHTML = `${text} <span class="remove-btn">✖</span>`;
        tag.querySelector(".remove-btn").onclick = function () {
          tag.remove();
        };
        container.appendChild(tag);
      }

      initInput("include-section", "include-tags");
      initInput("exclude-section", "exclude-tags");
    </script>
  </body>
</html>
