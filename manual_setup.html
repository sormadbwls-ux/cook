<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>요리조리 - 재료 편집</title>
    <style>
      /* [1. 기본 스타일 - PC 기준] */
      body {
        margin: 0;
        padding: 0;
        font-family: "LotteMartDream", sans-serif;
        background-color: #ffffff;
        overflow-x: hidden; /* 가로 스크롤 방지 */
      }
      .header-content {
        padding: 40px 25px 10px 25px;
      }
      .back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 45px;
        height: 45px;
        background-color: #addb47;
        border-radius: 50%;
        text-decoration: none;
        margin-bottom: 20px;
      }
      .back-btn img {
        width: 20px;
      }
      .title-green {
        color: #addb47;
        font-weight: bold;
        font-size: 22px;
        margin: 0;
      }
      .sub-title {
        color: #333;
        font-size: 16px;
        margin: 5px 0 40px 0;
      }

      .main-container {
        display: flex;
        padding: 0 25px;
        gap: 60px;
        margin-bottom: 120px; /* 하단 버튼 공간 확보 */
      }
      .section {
        flex: 1;
      }
      .section-title {
        font-size: 18px;
        font-weight: bold;
        color: #555;
        margin-bottom: 15px;
      }

      .input-wrapper {
        position: relative;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
      }
      .ingredient-input {
        width: 100%;
        padding: 15px 45px 15px 20px;
        border: 2px solid #addb47;
        border-radius: 40px;
        outline: none;
        font-size: 14px;
        box-sizing: border-box;
      }
      .section.exclude .ingredient-input {
        border-color: #ddd;
      }

      .clear-input-btn {
        position: absolute;
        right: 15px;
        color: #ccc;
        cursor: pointer;
        font-size: 18px;
        user-select: none;
        padding: 5px;
      }

      .tag-label {
        font-size: 14px;
        font-weight: bold;
        color: #666;
        margin-bottom: 15px;
      }
      .tag-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tag {
        display: flex;
        align-items: center;
        padding: 8px 15px;
        background-color: #f2f2f2;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
        color: #444;
      }
      .remove-btn {
        margin-left: 8px;
        cursor: pointer;
        color: #999;
      }

      /* 하단 고정 버튼 */
      .bottom-area {
        position: fixed;
        bottom: 30px;
        width: 100%;
        text-align: center;
        z-index: 100;
      }
      .search-btn {
        width: 85%;
        max-width: 500px;
        padding: 18px;
        background-color: #addb47;
        border: none;
        border-radius: 40px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      /* ============================================================
         [2. 모바일 보정 스타일 - 왼쪽 이미지 디자인 적용]
         ============================================================ */
      @media screen and (max-width: 767px) {
        .header-content {
          padding: 30px 20px 5px 20px;
        }
        .title-green {
          font-size: 18px;
        }
        .sub-title {
          font-size: 14px;
          margin-bottom: 30px;
        }

        /* 가로 2단을 세로 1단으로! */
        .main-container {
          flex-direction: column;
          gap: 40px;
          padding: 0 20px;
        }

        .section-title {
          font-size: 16px;
        }

        .ingredient-input {
          padding: 12px 40px 12px 18px;
          font-size: 13px;
        }

        /* 하단 버튼을 모바일 화면에 맞게 조절 */
        .bottom-area {
          bottom: 20px;
        }
        .search-btn {
          width: 90%;
          padding: 15px;
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header-content">
      <a href="upload.html" class="back-btn">
        <!-- 뒤로가기 아이콘 경로 확인용 -->
        <img src="assets/icons/back icon.png" alt="뒤로가기" />
      </a>
      <p class="title-green">냉장고 속의 재료를 입력해주세요</p>
      <p class="sub-title">최적의 레시피를 찾아드릴게요</p>
    </div>

    <div class="main-container">
      <!-- 왼쪽 구역: 재료 입력 -->
      <div class="section" id="include-section">
        <p class="section-title">재료 입력</p>
        <div class="input-wrapper">
          <input
            type="text"
            class="ingredient-input"
            placeholder="여러개의 재료 입력 시 재료마다 띄어쓰기를 해주세요"
          />
          <span class="clear-input-btn">✖</span>
        </div>
        <p class="tag-label">입력된 재료</p>
        <div class="tag-container" id="include-tags">
          <!-- 예시 태그 (이미지 디자인용) -->
          <div class="tag">당근 <span class="remove-btn">✖</span></div>
          <div class="tag">돼지고기 <span class="remove-btn">✖</span></div>
          <div class="tag">상추 <span class="remove-btn">✖</span></div>
        </div>
      </div>

      <!-- 오른쪽 구역: 제외할 재료 -->
      <div class="section exclude" id="exclude-section">
        <p class="section-title">레시피에 제외 할 재료</p>
        <div class="input-wrapper">
          <input
            type="text"
            class="ingredient-input"
            placeholder="여러개의 재료 입력 시 재료마다 띄어쓰기를 해주세요"
          />
          <span class="clear-input-btn">✖</span>
        </div>
        <p class="tag-label">입력된 재료</p>
        <div class="tag-container" id="exclude-tags">
          <!-- 예시 태그 (이미지 디자인용) -->
          <div class="tag">호두 <span class="remove-btn">✖</span></div>
          <div class="tag">샐러리 <span class="remove-btn">✖</span></div>
          <div class="tag">고추장 <span class="remove-btn">✖</span></div>
        </div>
      </div>
    </div>

    <!-- 하단 고정 검색 버튼 -->
    <div class="bottom-area">
      <button class="search-btn" onclick="location.href = 'recipe_search.html'">
        검색
      </button>
    </div>

    <script>
      function initInput(sectionId, containerId) {
        const section = document.getElementById(sectionId);
        const input = section.querySelector(".ingredient-input");
        const container = document.getElementById(containerId);
        const clearBtn = section.querySelector(".clear-input-btn");

        // 1. 엔터 치면 태그 추가
        input.addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            const value = this.value.trim();
            if (value) {
              createTag(value, container);
              this.value = "";
            }
          }
        });

        // 2. 입력창 옆 ✖ 버튼 누르면 텍스트만 삭제
        clearBtn.addEventListener("click", function () {
          input.value = "";
          input.focus();
        });
      }

      function createTag(text, container) {
        const tag = document.createElement("div");
        tag.className = "tag";
        tag.innerHTML = `${text} <span class="remove-btn">✖</span>`;
        tag.querySelector(".remove-btn").onclick = function () {
          tag.remove();
        };
        container.appendChild(tag);
      }

      initInput("include-section", "include-tags");
      initInput("exclude-section", "exclude-tags");
    </script>
  </body>
</html>
